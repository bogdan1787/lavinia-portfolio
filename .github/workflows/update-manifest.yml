name: Update Gallery

on:
  push:
    branches: [main]
    paths:
      - "images/**"
      - "index.html"
      - "style.css"
      - "script.js"
      - "sw.js"
      - ".lighthouserc.json"
      - "CNAME"
      - "generate-manifest.py"
      - "optimize-images.py"
      - "hash-assets.py"
      - "validate.py"
  workflow_dispatch:       # allow a manual run from the Actions tab

permissions:
  contents: write          # needed to commit the manifest back
  pages: write             # needed for GitHub Pages deployment
  id-token: write          # needed for OIDC Pages deployment

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── 1. Regenerate image-manifest.json ──────────────────────────────────────
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pillow, fonts, ffmpeg, and AVIF support
        run: |
          pip install Pillow --quiet
          sudo apt-get update -qq
          sudo apt-get install -y fonts-urw-base35 ffmpeg libavif-dev

      - name: Optimize images (with AVIF)
        run: python optimize-images.py

      - name: Generate manifest & sitemap
        run: python generate-manifest.py

      - name: Validate output
        run: python validate.py

      - name: Cache-bust static assets
        run: python hash-assets.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add image-manifest.json image-dates.json image-hashes.json og-preview.jpg sitemap.xml
          git add images/ fonts/ sw.js hash-assets.py
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: optimize images & update manifest [skip ci]"
            git push
          fi

  # ── 2. Lighthouse CI ────────────────────────────────────────────────────────
  lighthouse:
    needs: update-manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: '.lighthouserc.json'

  # ── 3. Deploy to GitHub Pages ───────────────────────────────────────────────
  deploy:
    needs: update-manifest
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (with fresh manifest)
        uses: actions/checkout@v4
        with:
          ref: main           # pick up the manifest commit if it was just pushed

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."           # serve the repo root

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
